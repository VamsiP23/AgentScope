name: Dependency Outage Redis Cart
namespace: default
startup:
  enabled: true
  args: []
timings:
  pre_fault_delay_seconds: 60
  post_fault_delay_seconds: 30
traffic:
  enabled: true
  base_url: http://localhost:8080
  duration_seconds: 300
  rps: 1
baseline:
  enabled: true
  duration_seconds: 300
  interval_seconds: 15
fault:
  scenario: dependency_outage
  auto_revert: true
  duration_seconds: 120
detector:
  enabled: true
  prom_url: http://localhost:9090
  target_deployment: redis-cart
  interval_seconds: 10
